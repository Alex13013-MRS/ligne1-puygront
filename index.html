<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transport-Manager — Ligne 1</title>
<style>
  :root{
    --line:#dc241f;
    --bg:#ffffff;
    --soft:#f6f6f7;
    --border:#e6e6ea;
    --text:#111;
    --muted:#5b5b66;
  }

  body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}
  .wrap{max-width:1120px;margin:0 auto;padding:14px;}

  .card{
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 6px 18px rgba(0,0,0,.04);
  }

  /* Bandeau */
  .topbar{
    background:linear-gradient(90deg, rgba(255,255,255,.12), rgba(255,255,255,0)) , var(--line);
    color:#fff;
    padding:14px 16px;
    position:relative;
  }
  .topbar:after{
    content:"";
    position:absolute;left:0;top:0;bottom:0;width:8px;
    background:rgba(0,0,0,.12);
  }
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
  .linepill{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.22);
    padding:6px 10px;border-radius:999px;font-weight:800;
  }
  .subpill{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    padding:6px 10px;border-radius:999px;font-weight:800;
  }
  .title{font-size:18px;font-weight:900;margin:6px 0 0;}
  .subtitle{opacity:.95;margin:4px 0 0;font-size:13px}

  .content{padding:14px 16px 16px;}
  .muted{color:var(--muted)}

  /* Encadré info service */
  .info{
    border:1px solid var(--border);
    background:var(--soft);
    border-radius:12px;
    padding:10px 12px;
    display:flex;gap:10px;flex-wrap:wrap;
    align-items:center;justify-content:space-between;
    margin-bottom:12px;
  }
  .info .k{font-weight:900}
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:999px;
    border:1px solid var(--border);
    background:#fff;color:var(--muted);
    font-size:12px;font-weight:900;
  }
  .badgeDot{
    width:10px;height:10px;border-radius:999px;background:var(--line);
    box-shadow:0 0 0 3px rgba(0,0,0,.04) inset;
  }

  /* Grille */
  .gridCard{border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .gridHead{
    background:#fff;
    padding:10px 12px;
    border-bottom:1px solid var(--border);
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
  }
  .gridHead strong{font-size:14px}
  .dirTitle{
    display:flex;align-items:center;gap:8px;font-weight:900;
  }
  .dirBar{width:10px;height:10px;border-radius:3px;background:var(--line);}

  .tableWrap{overflow:auto;}
  table{width:100%;border-collapse:collapse;min-width:820px;}
  th,td{border-top:1px solid var(--border);padding:9px 10px;vertical-align:top;}
  thead th{background:#fff;position:sticky;top:0;z-index:2}
  .hcol{width:70px;color:var(--muted);font-weight:900;white-space:nowrap;}
  .mins{font-variant-numeric:tabular-nums;line-height:1.6;}
  .mins .chip{
    display:inline-flex;
    align-items:center;justify-content:center;
    min-width:28px;height:22px;
    padding:0 6px;
    border-radius:999px;
    border:1px solid var(--border);
    background:#fff;
    margin:0 6px 6px 0;
    font-weight:800;
  }
  .empty{color:#9a9aa5}

  /* Séparations de plage */
  tr.cut td{border-top:2px solid rgba(0,0,0,.14);}
  tr.cut td:first-child{position:relative;}
  tr.cut td:first-child:before{
    content:"";
    position:absolute;left:0;top:-2px;height:2px;width:100%;
    background:linear-gradient(90deg, var(--line), rgba(0,0,0,0));
  }

  /* Heures de pointe (fréquence 16) */
  tr.peak td{background:rgba(0,0,0,.02);}
  tr.peak td .chip{border-color:rgba(0,0,0,.12);}

  /* Légende */
  .legend{
    margin-top:10px;
    color:var(--muted);
    font-size:12px;line-height:1.5;
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
  }
  .legendBox{
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  }
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:999px;
    border:1px solid var(--border);
    background:#fff;
    font-weight:900;
  }
  .pill b{color:var(--text)}
  .pill .dot{width:10px;height:10px;border-radius:999px;background:var(--line);opacity:.25}
  .pill .dot.strong{opacity:.55}

  @media (max-width:720px){
    table{min-width:760px;}
    .hcol{width:58px}
    .mins .chip{min-width:26px}
  }
  /* Bandeau fréquences */
.freqCard{
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:12px;
  background:#fff;
}
.freqHead{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
}
.freqBar{
  display:flex;
  width:100%;
  min-height:54px;
}
.seg{
  position:relative;
  padding:10px 10px 10px 12px;
  border-right:1px solid rgba(0,0,0,.06);
  display:flex;flex-direction:column;justify-content:center;
}
.seg:last-child{border-right:0}
.seg .t{font-weight:900;font-size:13px}
.seg .s{color:var(--muted);font-weight:900;font-size:12px;margin-top:2px}
.seg:before{
  content:"";
  position:absolute;left:0;top:0;bottom:0;width:6px;
  background:var(--line);
  opacity:.18;
}
.seg[data-f="16"]:before{opacity:.45;}
.seg[data-f="24"]:before{opacity:.30;}
.seg[data-f="48"]:before{opacity:.18;}

  .icon{width:16px;height:16px;display:inline-block;vertical-align:-3px}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="topbar">
      <div class="row">
        <div>
          <div class="linepill">
            <svg class="icon" viewBox="0 0 24 24" fill="none">
              <path d="M4 16V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <path d="M6 16h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <path d="M7.5 19a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" fill="white"/>
              <path d="M16.5 19a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" fill="white"/>
            </svg>
            Ligne 1
          </div>
          <div class="title" id="lineTitle">Campus Alan Turing ⇄ Gare Centrale</div>
          <div class="subtitle">Fiche horaire — grille par heure</div>
        </div>

        <div class="subpill">
          <svg class="icon" viewBox="0 0 24 24" fill="none">
            <path d="M7 3v3M17 3v3" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 8h16" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 21h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z" stroke="white" stroke-width="2"/>
          </svg>
          <span id="todayTxt">Horaires du jour</span>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="info">
        <div>
          <div class="muted">Service du jour</div>
          <div class="k" id="periodLine">…</div>
        </div>
        <div class="badge" id="gridBadge"><span class="badgeDot"></span> …</div>
      </div>

      <div class="freqCard">
        <div class="freqHead">
        <strong>Fréquences</strong>
        <span class="badge"><span class="badgeDot"></span> Synthèse du service</span>
        </div>
        <div class="freqBar" id="freqBar"></div>
        </div>

      <div class="gridCard">
        <div class="gridHead">
          <strong>Départs</strong>
          <span class="badge"><span class="badgeDot"></span> Ligne 1</span>
        </div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th class="hcol">Heure</th>
                <th id="thA">
                  <span class="dirTitle"><span class="dirBar"></span><span id="dirATxt">Direction A → B</span></span>
                </th>
                <th id="thB">
                  <span class="dirTitle"><span class="dirBar"></span><span id="dirBTxt">Direction B → A</span></span>
                </th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="legend">
        <div class="legendBox" id="legendBox"></div>
        <div class="muted">Jours fériés (France) = <b>Dimanche & JF</b>.</div>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================
   CONFIG LIGNE
========================= */
const LINE = {
  color: "#dc241f",
  terminusA: "Campus Alan Turing",
  terminusB: "Gare Centrale"
};

/* =========================
   VACANCES SCOLAIRES (inclusives)
========================= */
const VACANCES = [
  ["2025-10-18","2025-11-02"],
  ["2025-12-20","2026-01-04"],
  ["2026-02-07","2026-02-22"],
  ["2026-04-04","2026-04-19"],
  ["2026-07-04","2026-08-30"]
];

/* =========================
   SERVICES (TES RÈGLES)
   Chaque entrée = [deHH, deMM, àHH, àMM, fréquenceMinutes]
   (fin exclusive)
========================= */
const SERVICES = {
  normal: {
    luve: [
      [5,0, 7,0, 24],
      [7,0, 9,0, 16],
      [9,0, 16,0, 24],
      [16,0, 20,0, 16],
    ],
    sa: [
      [5,0, 8,0, 24],
      [8,0, 17,0, 24],
      [17,0, 20,0, 24],
      [20,0, 24,0, 48],
    ],
    di: [
      [10,0, 19,0, 48],
    ]
  },
  vacances: {
    luve: [
      [5,0, 7,0, 24],
      [7,0, 9,0, 24],
      [9,0, 16,0, 24],
      [16,0, 20,0, 24],
    ],
    sa: [
      [5,0, 8,0, 24],
      [8,0, 17,0, 24],
      [17,0, 20,0, 24],
    ],
    di: [
      [10,0, 19,0, 48],
    ]
  }
};

/* =========================
   OUTILS DATE
========================= */
function pad2(n){ return String(n).padStart(2,"0"); }
function iso(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function inRange(dateISO,start,end){ return dateISO>=start && dateISO<=end; }
function toMin(h,m){ return h*60 + m; }
function minToHM(t){ return {h: Math.floor(t/60), m: t%60}; }

/* Pâques (Meeus, grégorien) */
function easterSunday(year){
  const a=year%19, b=Math.floor(year/100), c=year%100, d=Math.floor(b/4), e=b%4;
  const f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3);
  const h=(19*a + b - d - g + 15)%30;
  const i=Math.floor(c/4), k=c%4;
  const l=(32 + 2*e + 2*i - h - k)%7;
  const m=Math.floor((a + 11*h + 22*l)/451);
  const month=Math.floor((h + l - 7*m + 114)/31);
  const day=((h + l - 7*m + 114)%31)+1;
  return new Date(year, month-1, day);
}
function addDays(dateObj, days){ const d=new Date(dateObj.getTime()); d.setDate(d.getDate()+days); return d; }
function frenchPublicHolidaysISO(year){
  const easter=easterSunday(year);
  const list = [
    `${year}-01-01`,
    iso(addDays(easter, 1)),
    `${year}-05-01`,
    `${year}-05-08`,
    iso(addDays(easter, 39)),
    iso(addDays(easter, 50)),
    `${year}-07-14`,
    `${year}-08-15`,
    `${year}-11-01`,
    `${year}-11-11`,
    `${year}-12-25`
  ];
  return new Set(list);
}

/* =========================
   GÉNÉRATION HORAIRES (CONTINUE)
   -> respecte la continuité entre plages
========================= */
function buildDeparturesContinuous(rules){
  const times = [];
  if(!rules || rules.length===0) return times;

  let t = toMin(rules[0][0], rules[0][1]); // premier départ = 1er début (05:00)
  for(let i=0;i<rules.length;i++){
    const [h1,m1,h2,m2,f] = rules[i];
    const start = toMin(h1,m1);
    const end   = toMin(h2,m2);

    if (t < start) t = start;

    while(t < end && t < 1440){
      times.push(t);
      t += f;
    }
    // pas de recalage à end : continuité
  }
  return Array.from(new Set(times)).sort((a,b)=>a-b);
}

function groupByHour(times){
  const map = new Map();
  for(const t of times){
    const {h,m} = minToHM(t);
    if(!map.has(h)) map.set(h, []);
    map.get(h).push(m);
  }
  for(const [h,arr] of map.entries()){
    arr.sort((a,b)=>a-b);
    map.set(h, arr);
  }
  return map;
}

function renderMinutesChips(arr){
  if(!arr || arr.length===0) return `<span class="empty">—</span>`;
  return arr.map(m => `<span class="chip">${pad2(m)}</span>`).join("");
}

/* =========================
   AIDE VISUELLE : plages (coupures + pointe)
========================= */
function hourCutsFromRules(rules){
  // renvoie les heures entières où une plage commence (hors toute première)
  const cuts = new Set();
  for(let i=1;i<rules.length;i++){
    const [h1,m1] = rules[i];
    if(m1===0) cuts.add(h1); // on marque les changements à HH:00
  }
  return cuts;
}

function isPeakHour(h, rules){
  // "pointe" si une plage couvrant cette heure a une fréquence de 16
  const t = h*60; // début d'heure
  for(const [h1,m1,h2,m2,f] of rules){
    const start = toMin(h1,m1), end = toMin(h2,m2);
    if(t >= start && t < end){
      return f === 16;
    }
  }
  return false;
}

function legendFromRules(rules){
  const freqs = Array.from(new Set(rules.map(r => r[4]))).sort((a,b)=>a-b);
  return freqs;
}

/* =========================
   CALCUL DU JOUR
========================= */
const now = new Date();
const todayISO = iso(now);
const jf = frenchPublicHolidaysISO(now.getFullYear());

let periode = "normal";
for (const p of VACANCES){
  if (inRange(todayISO, p[0], p[1])) { periode="vacances"; break; }
}

let type = "luve";
if (now.getDay() === 6) type = "sa";
if (now.getDay() === 0 || jf.has(todayISO)) type = "di";

const rules = SERVICES[periode][type];

/* =========================
   RENDU EN-TÊTE
========================= */
document.documentElement.style.setProperty("--line", LINE.color);
document.getElementById("lineTitle").textContent = `${LINE.terminusA} ⇄ ${LINE.terminusB}`;
document.getElementById("dirATxt").textContent = `${LINE.terminusA} → ${LINE.terminusB}`;
document.getElementById("dirBTxt").textContent = `${LINE.terminusB} → ${LINE.terminusA}`;

const frDate = now.toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
document.getElementById("todayTxt").textContent = `Horaires du jour — ${frDate}`;

const labelPeriode = (periode==="vacances") ? "Période vacances scolaires" : "Période normale";
const labelType = (type==="luve") ? "LU–VE" : (type==="sa") ? "Samedi" : "Dimanche & JF";

document.getElementById("periodLine").textContent =
  `${labelPeriode} — ${labelType}${jf.has(todayISO) ? " (jour férié)" : ""}`;
document.getElementById("gridBadge").innerHTML =
  `<span class="badgeDot"></span> ${labelType}`;

/* =========================
   GRILLE
   -> mêmes horaires dans les 2 sens (pour l’instant)
========================= */
const departures = buildDeparturesContinuous(rules);
const byHour = groupByHour(departures);

// plage d’affichage
let minHour = 24, maxHour = 0;
for(const h of byHour.keys()){
  minHour = Math.min(minHour, h);
  maxHour = Math.max(maxHour, h);
}
if (minHour === 24){ minHour = 5; maxHour = 20; }

const cuts = hourCutsFromRules(rules);
const tbody = document.getElementById("tbody");

let html = "";
for(let h=minHour; h<=maxHour; h++){
  const mins = byHour.get(h) || [];
  const cutClass = cuts.has(h) ? "cut" : "";
  const peakClass = isPeakHour(h, rules) ? "peak" : "";
  html += `
    <tr class="${cutClass} ${peakClass}">
      <td class="hcol">${pad2(h)}h</td>
      <td class="mins">${renderMinutesChips(mins)}</td>
      <td class="mins">${renderMinutesChips(mins)}</td>
    </tr>
  `;
}
tbody.innerHTML = html;

// légende fréquences
const freqs = legendFromRules(rules);
document.getElementById("legendBox").innerHTML = freqs.map(f => {
  const dotClass = (f === 16) ? "dot strong" : "dot";
  return `<span class="pill"><span class="${dotClass}"></span><b>${f}</b> min</span>`;
}).join("");
// Bandeau fréquences (segments)
function labelRange(h1,m1,h2,m2){
  const a = `${pad2(h1)}:${pad2(m1)}`;
  const b = (h2===24 && m2===0) ? "00:00" : `${pad2(h2)}:${pad2(m2)}`;
  return `${a} – ${b}`;
}
document.getElementById("freqBar").innerHTML = rules.map(r => {
  const [h1,m1,h2,m2,f] = r;
  // largeur proportionnelle à la durée
  const w = (toMin(h2,m2) - toMin(h1,m1));
  return `
    <div class="seg" data-f="${f}" style="flex:${w}">
      <div class="t">${labelRange(h1,m1,h2,m2)}</div>
      <div class="s">toutes les ${f} min</div>
    </div>
  `;
}).join("");
</script>

</body>
</html>
